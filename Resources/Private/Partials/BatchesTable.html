<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">
    <h2>
        <f:translate key="module.batches" extensionName="{localLangExtensionName}" />
    </h2>

    <f:be.tableList tableName="{batches.tableName}" storagePid="{id}" readOnly="1" fieldList="{batches.fieldList}">
        <div class="alert alert-info">
            <div class="media">
                <div class="media-left">
                    <span class="fa-stack fa-lg">
                        <i class="fa fa-circle fa-stack-2x"></i>
                        <i class="fa fa-info fa-stack-1x"></i>
                    </span>
                </div>
                <div class="media-body">
                    <div class="alert-message">
                        <f:translate key="module.batches.error-if-no-record" extensionName="{localLangExtensionName}" />
                    </div>
                </div>
            </div>
        </div>
    </f:be.tableList>
    <style>
        /* Hide download button, as f:be.tableList can not be extend anymore */
        #t3-table-tx_nxgooglelocations_domain_model_batch .recordlist-heading-actions [data-recordlist-action='download'] {
            display: none;
        }
    </style>
</html>
